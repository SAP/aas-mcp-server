# GitHub auto-generated release notes configuration.
# Categorizes PRs by label. Unlabeled PRs fall into "Other Changes".
# Ref: https://docs.github.com/en/repositories/releasing-projects-on-github/automatically-generated-release-notes

changelog:
  exclude:
    labels:
      - ignore-for-release
      - skip-changelog
    authors:
      - dependabot
      - renovate
  categories:
    - title: "🚀 Features"
      labels:
        - feature
        - enhancement
    - title: "🐛 Bug Fixes"
      labels:
        - bug
        - fix
    - title: "🔒 Security"
      labels:
        - security
    - title: "📖 Documentation"
      labels:
        - documentation
    - title: "🧹 Maintenance"
      labels:
        - chore
        - ci
        - build
        - dependencies
        - refactor
    - title: "Other Changes"
      labels:
        - "*"
